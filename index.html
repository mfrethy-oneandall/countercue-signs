<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>CounterCue Signs | Closed</title>
  <style>
    :root { color-scheme: light; --ink:#1d2421; --muted:#5d6661; --line:#d9ded9; --paper:#f5f6f3; --panel:#ffffff; --red:#8f2b22; --soft:#fdebe7; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:var(--paper); color:var(--ink); line-height:1.5; }
    main { width:min(720px, 100%); padding:28px; border:1px solid var(--line); border-radius:8px; background:var(--panel); }
    .eyebrow { margin:0 0 8px; color:var(--red); font-size:.82rem; font-weight:800; text-transform:uppercase; letter-spacing:0; }
    h1 { margin:0 0 12px; font-size:clamp(2rem, 5vw, 3.5rem); line-height:1.04; letter-spacing:0; }
    p { margin:0 0 14px; color:var(--muted); }
    .notice { margin-top:18px; padding:14px; border:1px solid #efb6ad; border-radius:8px; background:var(--soft); color:var(--ink); }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Project closed</p>
    <h1>CounterCue Signs is not accepting orders.</h1>
    <p>CounterCue is no longer being launched as a separate company or autonomous store project.</p>
    <p class="notice">No products are being sold from this page. No custom order inquiries, revisions, local pickup requests, or shipping requests are being accepted here.</p>
  </main>
</body>
</html>
